<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <style>
      body {
        background-color: #c80d0d;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-optical-sizing: auto;
      }
      div {
        display: inline-block;
        background-color: bisque;
        width: 400px;
        height: 400px;
        margin: 25px;
        margin-top: 30px;
        border: solid 5px black;
        padding: 40px;
        border-radius: 20px;
      }
      img {
        width: 50px;
      }
      a:link div {
        border-color: aqua;
      }
      a:visited div {
        border-color: green;
      }
      a:hover div {
        border-color: aqua;
        width: 450px;
        height: 450px;
      }
      a:active div {
        border-color: orange;
        width: 400px;
        height: 400px;
      }
